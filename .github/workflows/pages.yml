name: pages

# Publishes the install scripts (and a tiny landing page) to GitHub Pages so
# the one-liner can use a stable, cached URL:
#   https://zpg6.github.io/ecal-mcp/install.sh
#   https://zpg6.github.io/ecal-mcp/install.ps1

on:
  push:
    branches: [main]
    paths:
      - install.sh
      - install.ps1
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage site
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p _site
          cp install.sh  _site/install.sh
          cp install.ps1 _site/install.ps1
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>ecal-mcp</title>
              <meta name="viewport" content="width=device-width,initial-scale=1">
              <style>
                body { font-family: ui-sans-serif, system-ui, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1rem; line-height: 1.5; color: #111; }
                code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
                pre { background: #f5f5f5; padding: 1rem; border-radius: 6px; overflow-x: auto; }
                a { color: #0366d6; }
                h1 { margin-bottom: 0.25rem; }
                .sub { color: #555; margin-top: 0; }
              </style>
            </head>
            <body>
              <h1>ecal-mcp</h1>
              <p class="sub">Local MCP server for Eclipse eCAL. <a href="https://github.com/zpg6/ecal-mcp">GitHub &rarr;</a></p>

              <h2>Install (Linux)</h2>
              <pre><code>curl -fsSL https://zpg6.github.io/ecal-mcp/install.sh | bash</code></pre>

              <h2>Install (Windows, PowerShell)</h2>
              <pre><code>irm https://zpg6.github.io/ecal-mcp/install.ps1 | iex</code></pre>

              <p>Both installers resolve the latest GitHub Release, verify the SHA-256, and drop the <code>ecal-mcp</code> binary in a sensible default location. See the <a href="https://github.com/zpg6/ecal-mcp#install">README</a> for env-var overrides.</p>
            </body>
          </html>
          HTML

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
