# Realnet e2e topology.
#
# Four containers on a user-defined bridge network. The roles are
# spread across hosts so the suite samples every realistic placement
# variant:
#
#                 publisher  subscriber  service  MCP
#   pub  (mixed)      ✓          ✓                       (pub + sub on the SAME topic)
#   sub  (pure-sub)              ✓                       (sub-only host)
#   svc  (pure-svc)                          ✓
#   mcp  (mixed)      ✓                              ✓   (MCP + pub on the same host)
#
# This means PUB_TOPIC ("ecal_mcp_realnet_pub") has:
#   * 2 publishers across 2 hosts  (pub @ 10 Hz, mcp @ 5 Hz)
#   * 2 dedicated remote subscribers across 2 hosts  (pub, sub)
#     plus MCP's transient subs from ecal_subscribe / ecal_diagnose_topic
#
# Why this matters: realistic eCAL deployments have both mixed-role
# hosts and pure-role hosts; service routing must be independent of
# topic routing (`svc` proves that — it has no pub/sub at all); and
# `ecal_list_subscribers` cross-host coverage requires a non-MCP
# subscriber to register, since eCAL filters the caller's own
# monitoring entries out of its snapshot.
#
# Multicast UDP on 239.0.0.1 is forwarded between containers on the
# same Linux bridge — that's what eCAL's network-mode registration
# relies on. Topic data is forced over TCP via the mounted ecal.yaml.
# Each container has a distinct hostname → distinct shm_transport_domain
# → ecal_diagnose_topic's cross-host SHM-domain finding is reachable.
#
# Reuses the image built by the existing `make image` step — no extra build.
#
# IMPORTANT: every `command:` here is a YAML list, not a string. Compose's
# string form gets word-split before being handed to the entrypoint, which
# would tear apart the multi-line shell script.

name: ecal-mcp-realnet

networks:
  ecalnet:
    driver: bridge

x-base: &base
  image: ${ECAL_MCP_IMAGE:-ecal-mcp:e2e}
  networks: [ecalnet]
  shm_size: 256m
  volumes:
    - ./ecal.yaml:/home/ecal/.ecal/ecal.yaml:ro
  entrypoint: ["/bin/sh", "-c"]

services:
  # ---- Mixed pub+sub host ----------------------------------------------------
  # Hosts a publisher AND a subscriber on PUB_TOPIC simultaneously.
  # Models the realistic case where a single node both produces and
  # consumes the same logical topic (e.g. a node that re-emits, logs,
  # or fans out). Also runs the bundled protobuf person sender when
  # available, so it's where the typed-descriptor tests look.
  pub:
    <<: *base
    hostname: ecal-pub
    container_name: ecal-mcp-realnet-pub
    command:
      - |
        set -eu
        echo "[pub] starting helpers on $$(hostname)"
        /usr/local/bin/ecal-test-publisher \
            --topic ecal_mcp_realnet_pub \
            --prefix realnet \
            --interval-ms 100 &
        /usr/local/bin/ecal-test-subscriber \
            --topic ecal_mcp_realnet_pub &
        if command -v ecal_sample_person_send >/dev/null 2>&1; then
            echo "[pub] starting ecal_sample_person_send"
            ecal_sample_person_send &
        elif command -v ecal_sample_person_snd >/dev/null 2>&1; then
            echo "[pub] starting ecal_sample_person_snd (legacy name)"
            ecal_sample_person_snd &
        else
            echo "[pub] WARN: no person sample binary; protobuf checks will skip"
        fi
        exec tail -f /dev/null

  # ---- Pure subscriber host --------------------------------------------------
  # Subscriber-only host. Gives the topology a non-MCP subscriber on a
  # host with no publishers — the cleanest case for asserting that
  # cross-host subscriber registration reaches MCP via UDP multicast
  # and that ecal_diagnose_topic surfaces it.
  sub:
    <<: *base
    hostname: ecal-sub
    container_name: ecal-mcp-realnet-sub
    command:
      - |
        set -eu
        echo "[sub] starting subscriber on $$(hostname)"
        /usr/local/bin/ecal-test-subscriber \
            --topic ecal_mcp_realnet_pub &
        exec tail -f /dev/null

  # ---- Pure service host -----------------------------------------------------
  # Service-only host: no publishers, no subscribers. Forces MCP's
  # service-call routing to land on a host that shares no topic
  # transport state with anything else, which is the strongest
  # guarantee that service routing is independent of pub/sub topology.
  svc:
    <<: *base
    hostname: ecal-svc
    container_name: ecal-mcp-realnet-svc
    command:
      - |
        set -eu
        echo "[svc] starting service server on $$(hostname)"
        /usr/local/bin/ecal-test-service-server \
            --service ecal_mcp_realnet_service &
        exec tail -f /dev/null

  # ---- MCP host (mixed mcp+pub) ---------------------------------------------
  # MCP itself plus a second publisher on PUB_TOPIC at a different
  # rate / prefix. Together with `pub`'s publisher this gives the
  # suite a multi-publisher cross-host topology to assert against
  # (distinct host_name and topic_id per publisher).
  mcp:
    <<: *base
    hostname: ecal-mcp
    container_name: ecal-mcp-realnet-mcp
    depends_on: [pub, sub, svc]
    command:
      - |
        set -eu
        echo "[mcp] starting local publisher on $$(hostname)"
        /usr/local/bin/ecal-test-publisher \
            --topic ecal_mcp_realnet_pub \
            --prefix realnet-mcp \
            --interval-ms 200 &
        echo "[mcp] idle; use 'docker compose exec mcp ecal-mcp'"
        exec tail -f /dev/null
    stdin_open: true
    tty: false
