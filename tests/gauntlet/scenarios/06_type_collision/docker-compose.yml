# Gauntlet scenario 06: type_collision
#
# Two publishers register on the SAME topic name (`person`) with DIFFERENT
# datatype_information signatures:
#   - host `proto_node` runs `ecal_sample_person_send` → encoding "proto",
#     name "pb.People.Person" with a real FileDescriptor blob.
#   - host `string_node` runs `ecal-test-publisher --topic person` →
#     encoding "utf-8", name "string".
# A subscriber on `consumer` is registered for the topic. Anything that
# subscribes will get an interleaved garbled byte stream (proto bytes
# alongside ASCII), which is the classic eCAL "type collision" footgun
# that `ecal_diagnose_topic.type_signatures` is designed to surface.
#
# Hard part: the agent has to *prove* there are two distinct type
# signatures (not just two publishers), pick which one matches the
# intended consumer, and recommend renaming one topic.
name: ecal-mcp-gauntlet-06

networks:
  net:
    driver: bridge

x-base: &base
  image: ecal-mcp:e2e
  networks: [net]
  shm_size: 256m
  volumes:
    - ../shared/ecal.yaml:/home/ecal/.ecal/ecal.yaml:ro
  entrypoint: ["/bin/sh", "-c"]

services:
  proto_node:
    <<: *base
    hostname: proto-node
    command:
      - |
        set -eu
        ecal_sample_person_send &
        exec tail -f /dev/null

  string_node:
    <<: *base
    hostname: string-node
    command:
      - |
        set -eu
        ecal-test-publisher --topic person --prefix STRINGY --interval-ms 200 &
        exec tail -f /dev/null

  consumer:
    <<: *base
    hostname: consumer
    command:
      - |
        set -eu
        ecal-test-subscriber --topic person &
        exec tail -f /dev/null

  mcp:
    <<: *base
    hostname: mcp
    container_name: ecal-mcp-gauntlet-06-mcp
    depends_on: [proto_node, string_node, consumer]
    command: ["exec tail -f /dev/null"]
