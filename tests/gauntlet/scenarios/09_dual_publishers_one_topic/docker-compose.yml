# Gauntlet scenario 09: dual_publishers_one_topic
#
# Two publishers register on the SAME topic name (`/odom`) with the
# SAME `(name, encoding) = ("string", "utf-8")` datatype_information,
# so 06's `type_signatures[]` machinery is silent — but they publish at
# very different rates and from different hosts:
#
#   - host `primary` runs `ecal-test-publisher --interval-ms 10`  (~100 Hz)
#   - host `rogue`   runs `ecal-test-publisher --interval-ms 250` (~4 Hz)
#
# A long-lived subscriber on `consumer` registers for `/odom`. The
# subscriber's stream is the interleaved 100 Hz + 4 Hz mash, with
# bimodal inter-arrival gaps and content prefix flapping between
# `PRIMARY-…` and `ROGUE-…`. The classic "two publishers on one topic"
# anti-pattern: registration counts say `2`, but most operator triage
# starts at "is /odom at 100 Hz?" and stops there.
#
# Hard part: there is no MCP `FindingCode` for "≥2 producers on a 1:1
# topic" today. The agent must derive the diagnosis from
# `publishers[*]` count + `unit_name` / `process_name` / `host_name`
# divergence and from the bimodal jitter on the wire — possibly while
# the rate stats falsely look "close enough" to the 100 Hz expected
# value.
name: ecal-mcp-gauntlet-09

networks:
  net:
    driver: bridge

x-base: &base
  image: ecal-mcp:e2e
  networks: [net]
  shm_size: 256m
  volumes:
    - ../shared/ecal.yaml:/home/ecal/.ecal/ecal.yaml:ro
  entrypoint: ["/bin/sh", "-c"]

services:
  primary:
    <<: *base
    hostname: primary
    command:
      - |
        set -eu
        ecal-test-publisher --topic /odom --prefix PRIMARY --interval-ms 10 &
        exec tail -f /dev/null

  rogue:
    <<: *base
    hostname: rogue
    command:
      - |
        set -eu
        ecal-test-publisher --topic /odom --prefix ROGUE-DEBUG --interval-ms 250 &
        exec tail -f /dev/null

  consumer:
    <<: *base
    hostname: consumer
    command:
      - |
        set -eu
        ecal-test-subscriber --topic /odom &
        exec tail -f /dev/null

  mcp:
    <<: *base
    hostname: mcp
    container_name: ecal-mcp-gauntlet-09-mcp
    depends_on: [primary, rogue, consumer]
    command: ["exec tail -f /dev/null"]
