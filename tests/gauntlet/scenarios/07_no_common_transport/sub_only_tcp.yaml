communication_mode: "network"

registration:
  registration_refresh: 1000
  registration_timeout: 10000
  loopback: true
  shm_transport_domain: ""
  local:
    transport_type: "udp"
  network:
    transport_type: "udp"

transport_layer:
  udp:
    config_version: "v2"
    port: 14002
    mask: "255.255.255.240"
    send_buffer: 5242880
    receive_buffer: 5242880
    join_all_interfaces: false
    npcap_enabled: false
    local:
      group: "127.255.255.255"
      ttl: 1
    network:
      group: "239.0.0.1"
      ttl: 1
  tcp:
    number_executor_reader: 4
    number_executor_writer: 4
    max_reconnections: 5

# Publisher irrelevant on this host (no publisher runs here) but kept
# permissive so registration plumbing isn't artificially constrained.
publisher:
  layer:
    shm:
      enable: true
    udp:
      enable: true
    tcp:
      enable: true
  priority_local:   ["shm", "udp", "tcp"]
  priority_network: ["tcp", "udp"]

# Subscriber accepts TCP only — SHM and UDP disabled. With the publisher
# host configured to NOT advertise TCP, no transport layer overlaps and
# data structurally cannot flow.
subscriber:
  layer:
    shm:
      enable: false
    udp:
      enable: false
    tcp:
      enable: true
