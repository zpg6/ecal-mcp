# Gauntlet scenario 04: rate_drift
#
# Publisher on /heartbeat is configured to send every 1000 ms (1 Hz). The
# agent is told the SLA is 50 Hz. ecal_topic_stats with a long enough
# duration_ms should reveal the truth (~1 Hz, with low jitter). The cached
# `registered_data_frequency_hz` field on ecal_list_publishers should agree, but only
# after a few sample periods — agents that trust list_publishers's snapshot
# alone will get a stale read; ecal_topic_stats is the honest answer.
name: ecal-mcp-gauntlet-04

networks:
  net:
    driver: bridge

x-base: &base
  image: ecal-mcp:e2e
  networks: [net]
  shm_size: 256m
  volumes:
    - ../shared/ecal.yaml:/home/ecal/.ecal/ecal.yaml:ro
  entrypoint: ["/bin/sh", "-c"]

services:
  heartbeat_node:
    <<: *base
    hostname: heartbeat-node
    command:
      - |
        set -eu
        ecal-test-publisher --topic /heartbeat --prefix beat --interval-ms 1000 &
        exec tail -f /dev/null

  mcp:
    <<: *base
    hostname: mcp
    container_name: ecal-mcp-gauntlet-04-mcp
    depends_on: [heartbeat_node]
    command: ["exec tail -f /dev/null"]
