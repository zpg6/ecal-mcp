# Shared eCAL config for every gauntlet scenario.
#
# Network mode + UDP-multicast registration so participants on different
# Docker hosts find each other; subscriber.shm disabled so cross-host data
# is forced over TCP (the production-realistic path). Distinct hostnames
# per container produce distinct shm_transport_domains, which keeps any
# diagnostic finding for cross-host SHM splits reachable.

communication_mode: "network"

registration:
  registration_refresh: 1000
  registration_timeout: 10000
  loopback: true
  shm_transport_domain: ""
  local:
    transport_type: "udp"
  network:
    transport_type: "udp"

transport_layer:
  udp:
    config_version: "v2"
    port: 14002
    mask: "255.255.255.240"
    send_buffer: 5242880
    receive_buffer: 5242880
    join_all_interfaces: false
    npcap_enabled: false
    local:
      group: "127.255.255.255"
      ttl: 1
    network:
      group: "239.0.0.1"
      ttl: 1
  tcp:
    number_executor_reader: 4
    number_executor_writer: 4
    max_reconnections: 5

publisher:
  layer:
    shm:
      enable: true
    udp:
      enable: true
    tcp:
      enable: true
  priority_local:   ["shm", "udp", "tcp"]
  priority_network: ["tcp", "udp"]

subscriber:
  layer:
    shm:
      enable: false
    udp:
      enable: false
    tcp:
      enable: true
